site_name: STRATICA
site_description: Stratigraphic Pattern Recognition & Paleoclimatic Temporal Reconstruction
site_author: Samir Baladi
site_url: https://stratica.readthedocs.io

repo_url: https://github.com/gitdeeper8/STRATICA
repo_name: gitdeeper8/STRATICA
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  logo: assets/logo.png
  favicon: assets/favicon.ico

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - TCI Framework:
    - Overview: framework/overview.md
    - Nine Parameters: framework/parameters.md
    - TL-PINN: framework/tl-pinn.md
  - Parameters:
    - LDR (20%): parameters/ldr.md
    - ISO (15%): parameters/iso.md
    - MFA (12%): parameters/mfa.md
    - MAG (11%): parameters/mag.md
    - GCH (10%): parameters/gch.md
    - PYS (9%): parameters/pys.md
    - VSI (8%): parameters/vsi.md
    - TDM (8%): parameters/tdm.md
    - CEC (7%): parameters/cec.md
  - Case Studies:
    - PETM at ODP 1209B: case-studies/petm.md
    - Mass Extinctions: case-studies/extinctions.md
  - API Reference:
    - Core: api/core.md
    - Parameters: api/parameters.md
    - Models: api/models.md
    - Physics: api/physics.md
  - Tutorials:
    - Basic Analysis: tutorials/basic.md
    - Back-casting: tutorials/backcast.md
    - Dashboard: tutorials/dashboard.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gitdeeper8/STRATICA
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/gitdeeper8/STRATICA
    - icon: fontawesome/solid/globe
      link: https://stratica.netlify.app
  version:
    provider: mike

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          selection:
            docstring_style: google
          rendering:
            show_source: true
  - mike:
      version_selector: true
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

copyright: Copyright &copy; 2026 Samir Baladi, Ronin Institute
