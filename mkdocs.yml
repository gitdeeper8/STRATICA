site_name: STRATICA
site_description: Stratigraphic Pattern Recognition & Paleoclimatic Temporal Reconstruction
site_author: Samir Baladi
site_url: https://stratica.readthedocs.io

repo_url: https://gitlab.com/gitdeeper8/STRATICA
repo_name: gitdeeper8/STRATICA
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: teal
    accent: deep orange
  logo: assets/logo.png
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Framework:
      - Overview: framework/overview.md
      - TCI Index: framework/tci.md
      - Nine Parameters: framework/parameters.md
      - TL-PINN Architecture: framework/tl-pinn.md
  - Parameters:
      - LDR (20%): parameters/ldr.md
      - ISO (15%): parameters/iso.md
      - MFA (12%): parameters/mfa.md
      - MAG (11%): parameters/mag.md
      - GCH (10%): parameters/gch.md
      - PYS (9%): parameters/pys.md
      - VSI (8%): parameters/vsi.md
      - TDM (8%): parameters/tdm.md
      - CEC (7%): parameters/cec.md
  - Case Studies:
      - PETM at ODP 1209B: case_studies/petm.md
      - Pleistocene Transitions: case_studies/pleistocene.md
      - Cretaceous OAEs: case_studies/cretaceous.md
      - Eocene-Oligocene Transition: case_studies/eocene-oligocene.md
      - End-Permian Extinction: case_studies/permian.md
  - Validation:
      - Basin Coverage: validation/basins.md
      - Results: validation/results.md
      - Benchmarks: validation/benchmarks.md
  - API Reference:
      - Core: api/core.md
      - Parameters: api/parameters.md
      - TL-PINN: api/tl-pinn.md
      - Back-casting: api/backcast.md
  - Tutorials:
      - Quick Start: tutorials/quickstart.md
      - Basin Analysis: tutorials/basin.md
      - Isotope Back-casting: tutorials/isotope.md
      - Cycle Detection: tutorials/cycles.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/gitdeeper8/STRATICA
    - icon: fontawesome/brands/github
      link: https://github.com/gitdeeper8/STRATICA
    - icon: fontawesome/solid/globe
      link: https://stratica.netlify.app
  version:
    provider: mike
    default: latest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          selection:
            docstring_style: google
          rendering:
            show_source: true
  - mike:
      version_selector: true
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

copyright: Copyright &copy; 2026 Samir Baladi, Ronin Institute
