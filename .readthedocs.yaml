# .readthedocs.yaml
# Read the Docs configuration file for STRATICA

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    post_checkout:
      - echo "🪨 Building STRATICA documentation"
      - git fetch --unshallow || true
    pre_build:
      - python scripts/generate_api_docs.py
      - python scripts/validate_parameters.py --docs

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: false

formats:
  - pdf
  - epub

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    - requirements: docs/requirements.txt

env:
  STRATICA_VERSION: 1.0.0
  TCI_DOCS_MODE: production
  DISPLAY_CLASSIFICATION_ACCURACY: "96.2"
  DISPLAY_CYCLE_PRECISION: "1200"

search:
  ranking:
    api/*: 3
    parameters/*: 5
    case_studies/*: 4
    parameters/ldr/: 10
    parameters/iso/: 10
    case_studies/petm/: 8
